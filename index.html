<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spherical Light Display</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="canvas"></canvas>

  <!-- Node Editor Panel -->
  <div id="node-editor" class="panel hidden">
    <h3>Node Editor</h3>
    <label>Color
      <input type="color" id="node-color" value="#00ffff" />
    </label>
    <label>Opacity
      <input type="range" id="node-opacity" min="0" max="1" step="0.01" value="1" />
    </label>
    <label>Status
      <select id="node-status">
        <option value="active">Active</option>
        <option value="defective">Defective</option>
      </select>
    </label>
    <button id="btn-delete-node">Delete Node</button>
    <button id="btn-duplicate-node">Duplicate Node</button>
    <button id="btn-close-editor">Close</button>
  </div>

  <!-- Timeline / Program Panel -->
  <div id="timeline-panel" class="panel">
    <h3>Light Program</h3>
    <div class="row">
      <input type="text" id="program-name" placeholder="Program name" />
      <button id="btn-save-program">Save</button>
      <button id="btn-delete-program">Delete</button>
    </div>
    <div class="row">
      <select id="saved-programs"></select>
      <button id="btn-load-program">Load</button>
    </div>
    <div class="row">
      <label>Time <input type="range" id="timeline-scrubber" min="0" max="30" step="0.1" value="0" /></label>
      <span id="timeline-time">0.0s</span>
    </div>
    <div class="row">
      <button id="btn-add-keyframe">+ Keyframe</button>
      <button id="btn-play">&#9654; Play</button>
      <button id="btn-stop">&#9646;&#9646; Stop</button>
      <label><input type="checkbox" id="loop-toggle" /> Loop</label>
    </div>
    <div class="row">
      <button id="btn-export">Export JSON</button>
      <label>Import <input type="file" id="import-file" accept=".json" /></label>
    </div>
    <div class="row">
      <label><input type="checkbox" id="troubleshoot-toggle" /> Troubleshoot Mode</label>
    </div>
    <div id="keyframe-list"></div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.163.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
